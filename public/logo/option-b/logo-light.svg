<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40" fill="none">
  <!--
    Option B — light variant (explicitly for white backgrounds)
    Font: Space Grotesk (google.com/fonts)
  -->
  <defs>
    <linearGradient id="g" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#00BFA6"/>
    </linearGradient>
  </defs>

  <circle cx="20" cy="20" r="16"
    stroke="url(#g)" stroke-width="2.5" fill="none"
    stroke-dasharray="89.36 11.17"
    stroke-linecap="round"
    transform="rotate(110 20 20)"/>
  <circle cx="20" cy="20" r="9.5"
    stroke="url(#g)" stroke-width="2" fill="none"
    stroke-dasharray="53.06 6.63"
    stroke-linecap="round"
    transform="rotate(290 20 20)"/>
  <circle cx="20" cy="20" r="2.5" fill="url(#g)"/>

  <text x="52" y="27"
    font-family="'Space Grotesk', system-ui, -apple-system, sans-serif"
    font-size="20"
    letter-spacing="-0.3">
    <tspan fill="#0B1437" font-weight="400">Sistema</tspan><tspan fill="#00BFA6" font-weight="700">Hub</tspan>
  </text>
</svg>
