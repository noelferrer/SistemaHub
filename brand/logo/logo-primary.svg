  <line x1="20" y1="20" x2="30.39" y2="26"   stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="20" x2="20"    y2="32"   stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="20" x2="9.61"  y2="26"   stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="20" x2="9.61"  y2="14"   stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="20"    cy="8"  r="3" fill="url(#g)" opacity="0.6"/>
  <circle cx="30.39" cy="14" r="3" fill="url(#g)" opacity="0.6"/>
  <circle cx="30.39" cy="26" r="3" fill="url(#g)" opacity="0.6"/>
