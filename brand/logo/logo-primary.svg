  <text x="52" y="27"
    font-family="'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
    font-size="20">
    <tspan fill="#0B1437" font-weight="400">Sistema</tspan><tspan fill="#00BFA6" font-weight="700">Hub</tspan>
